name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: docker compose --project-directory . -f compose/docker-compose.yml -f compose/docker-compose.override.yml build web

      - name: Lint
        run: make lint

      - name: Test
        run: make test-unit test-smoke
