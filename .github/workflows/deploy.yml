name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: odin
  HEALTH_URL: https://odinseye.info/health

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsOdinDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --target production \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          PARAMS=$(jq -n \
            --arg region "$AWS_REGION" \
            --arg registry "$ECR_REGISTRY" \
            --arg repo "$ECR_REPOSITORY" \
            '{commands: [
              "cd /opt/odin",
              "git pull origin main",
              "AWS_REGION=\($region) ECR_REGISTRY=\($registry) ECR_REPOSITORY=\($repo) bash scripts/deploy.sh"
            ]}')
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM command id: $COMMAND_ID"
          aws ssm wait command-executed \
            --region $AWS_REGION \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
          aws ssm get-command-invocation \
            --region $AWS_REGION \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

      - name: Verify deploy via /health
        run: |
          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 10 "$HEALTH_URL" >/dev/null; then
              echo "health check passed on attempt $attempt"
              exit 0
            fi
            echo "health check attempt $attempt failed; retrying in 10s"
            sleep 10
          done
          echo "health check failed after 12 attempts (~2 minutes)"
          exit 1
