<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}Odin{% endblock %}
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@600;700&display=swap" />
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/static/css/odin.css" />
    {% block head_extra %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block header %}
      <header class="site-header">
        <a href="/" class="wordmark wordmark--small" aria-label="Odin home">
          <span>ODIN</span>
        </a>
        {% block header_actions %}
          <nav class="header-nav">
            {% if user %}
              <a href="/dashboard" class="header-nav__link">Dashboard</a>
              <a href="/auth/logout" class="header-nav__link">Sign out</a>
            {% else %}
              <a href="/login" class="header-nav__link">Sign in</a>
            {% endif %}
          </nav>
        {% endblock %}
      </header>
    {% endblock %}
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <span class="site-footer__brand">odin</span>
      <span class="site-footer__sep" aria-hidden="true">·</span>
      <span class="site-footer__muted">profiles synthesized from the web</span>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
