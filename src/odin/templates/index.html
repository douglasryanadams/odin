<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Odin</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>Odin</h1>
      <form method="get" action="/">
        <fieldset role="group">
          <input
            type="search"
            name="q"
            value="{{ query or '' }}"
            placeholder="Search…"
            autofocus
          />
          <button type="submit">Search</button>
          <button type="submit" formaction="/profile">Profile</button>
        </fieldset>
      </form>
      {% if results is not none %}
      <pre><code>{{ results }}</code></pre>
      {% endif %}
    </main>
  </body>
</html>
