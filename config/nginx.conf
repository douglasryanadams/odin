server {
    listen 8000 default_server;
    server_tokens off;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    gzip on;
    gzip_types text/css application/javascript text/plain image/x-icon image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    location /static/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
        try_files $uri =404;
    }

    location = /favicon.ico {
        alias /usr/share/nginx/html/static/favicon.ico;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    location = /robots.txt {
        alias /usr/share/nginx/html/static/robots.txt;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # CloudFront's SSE timeout is 120s; sit just above that so we close cleanly first.
    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Accel-Buffering no;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 130s;
        proxy_send_timeout 130s;
    }
}
