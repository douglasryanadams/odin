services:
  web:
    environment:
      - LOG_LEVEL=DEBUG
      - ANTHROPIC_API_KEY
      - BRAVE_API_KEY
      - BRAVE_ENABLED
      - SECRET_KEY
      - APP_URL
      - COOKIE_SECURE
    volumes:
      - playwright-state:/var/lib/odin/playwright-state
    depends_on:
      odin-valkey:
        condition: service_started
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    ports:
      - "8000:8000"
    volumes:
      - ./static:/usr/share/nginx/html/static:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/nginx-health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  searxng:
    # Pinned: avoid surprise upstream changes on auto-pull. Bump deliberately.
    image: docker.io/searxng/searxng:2026.5.9-0cba32c15
    entrypoint: ["/etc/searxng/entrypoint.sh"]
    environment:
      - BRAVE_API_KEY
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/:/etc/searxng/:Z
    # In-memory mount for the rendered settings.yml so the BRAVE_API_KEY never
    # touches the host filesystem; the entrypoint chmods the file to 0400.
    tmpfs:
      - /run/searxng
    depends_on:
      - searxng-valkey
    healthcheck:
      test: ["CMD", "wget", "--header=X-Forwarded-For:127.0.0.1", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  searxng-valkey:
    image: docker.io/valkey/valkey:9.0.4-alpine3.23
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - searxng-valkey-data:/data/

  odin-valkey:
    image: docker.io/valkey/valkey:9.0.4-alpine3.23
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - odin-valkey-data:/data/

  node:
    image: node:20-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    profiles: ["tools"]

volumes:
  searxng-valkey-data:
  odin-valkey-data:
  playwright-state:
