services:
  web:
    ports:
      - "8000:8000"

  searxng:
    image: docker.io/searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/:/etc/searxng/:Z
    depends_on:
      - searxng-valkey
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - searxng-valkey-data:/data/

volumes:
  searxng-valkey-data:
